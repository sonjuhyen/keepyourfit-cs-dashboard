<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>킵유어핏 CS 대시보드 🦦</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- 커스텀 스타일 -->
    <link rel="stylesheet" href="css/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50" x-data="csApp()">
    <!-- 헤더 -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🦦</span>
                    <h1 class="text-2xl font-bold text-gray-900">킵유어핏 CS 대시보드</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500" x-text="currentDate"></span>
                    <button 
                        @click="refreshData()"
                        class="bg-primary-500 text-white px-4 py-2 rounded-lg hover:bg-primary-600 transition-colors"
                    >
                        새로고침
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 메인 컨테이너 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        
        <!-- 탭 네비게이션 -->
        <div class="mb-6">
            <nav class="flex space-x-8">
                <button 
                    @click="activeTab = 'dashboard'" 
                    :class="activeTab === 'dashboard' ? 'border-primary-500 text-primary-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="py-2 px-1 border-b-2 font-medium text-sm"
                >
                    📊 대시보드
                </button>
                <button 
                    @click="activeTab = 'answers'" 
                    :class="activeTab === 'answers' ? 'border-primary-500 text-primary-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="py-2 px-1 border-b-2 font-medium text-sm"
                >
                    💬 답변 관리
                </button>
                <button 
                    @click="activeTab = 'logs'" 
                    :class="activeTab === 'logs' ? 'border-primary-500 text-primary-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="py-2 px-1 border-b-2 font-medium text-sm"
                >
                    📋 승인 로그
                </button>
                <button 
                    @click="activeTab = 'rules'" 
                    :class="activeTab === 'rules' ? 'border-primary-500 text-primary-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="py-2 px-1 border-b-2 font-medium text-sm"
                >
                    ⚙️ 자동처리 규칙
                </button>
            </nav>
        </div>

        <!-- 대시보드 탭 -->
        <div x-show="activeTab === 'dashboard'" class="space-y-6">
            
            <!-- KPI 카드들 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- 오늘 문의 수 -->
                <div class="bg-white rounded-lg p-6 shadow-sm">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <span class="text-2xl">📞</span>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">오늘 문의</dt>
                                <dd class="text-3xl font-bold text-gray-900" x-text="stats.today.total"></dd>
                            </dl>
                        </div>
                    </div>
                </div>

                <!-- 자동처리율 -->
                <div class="bg-white rounded-lg p-6 shadow-sm">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <span class="text-2xl">🤖</span>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">자동처리율</dt>
                                <dd class="text-3xl font-bold text-gray-900" x-text="stats.automation.rate + '%'"></dd>
                            </dl>
                        </div>
                    </div>
                </div>

                <!-- 승인율 -->
                <div class="bg-white rounded-lg p-6 shadow-sm">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <span class="text-2xl">✅</span>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">승인율</dt>
                                <dd class="text-3xl font-bold text-green-600" x-text="stats.approval.rate + '%'"></dd>
                            </dl>
                        </div>
                    </div>
                </div>

                <!-- 평균 응답시간 -->
                <div class="bg-white rounded-lg p-6 shadow-sm">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <span class="text-2xl">⏱️</span>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">평균 응답시간</dt>
                                <dd class="text-3xl font-bold text-gray-900" x-text="stats.avgResponseTime"></dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 차트 섹션 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- 문의 유형별 통계 -->
                <div class="bg-white rounded-lg p-6 shadow-sm">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">문의 유형별 통계</h3>
                    <canvas id="categoryChart" width="400" height="300"></canvas>
                </div>

                <!-- 처리 현황 -->
                <div class="bg-white rounded-lg p-6 shadow-sm">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">처리 현황</h3>
                    <canvas id="statusChart" width="400" height="300"></canvas>
                </div>
            </div>

            <!-- 최근 활동 -->
            <div class="bg-white rounded-lg p-6 shadow-sm">
                <h3 class="text-lg font-medium text-gray-900 mb-4">최근 활동</h3>
                <div class="space-y-3">
                    <template x-for="activity in recentActivities" :key="activity.id">
                        <div class="flex items-center p-3 bg-gray-50 rounded-lg">
                            <span class="text-xl mr-3" x-text="activity.icon"></span>
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-900" x-text="activity.title"></p>
                                <p class="text-xs text-gray-500" x-text="activity.time"></p>
                            </div>
                            <span 
                                :class="activity.status === '승인' ? 'bg-green-100 text-green-800' : activity.status === '거부' ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800'"
                                class="px-2 py-1 text-xs font-medium rounded-full"
                                x-text="activity.status"
                            ></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- 답변 관리 탭 -->
        <div x-show="activeTab === 'answers'" class="space-y-6">
            
            <!-- 검색 및 필터 -->
            <div class="bg-white rounded-lg p-6 shadow-sm">
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1">
                        <input 
                            type="text" 
                            x-model="searchTerm"
                            placeholder="답변 내용 또는 키워드로 검색..."
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                        >
                    </div>
                    <div>
                        <select 
                            x-model="selectedCategory"
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                        >
                            <option value="">전체 카테고리</option>
                            <option value="delivery">배송</option>
                            <option value="refund">환불</option>
                            <option value="product">제품</option>
                            <option value="general">일반</option>
                        </select>
                    </div>
                    <button 
                        @click="showNewAnswerModal = true"
                        class="bg-primary-500 text-white px-4 py-2 rounded-lg hover:bg-primary-600 transition-colors"
                    >
                        새 답변 추가
                    </button>
                </div>
            </div>

            <!-- 답변 목록 -->
            <div class="bg-white rounded-lg shadow-sm">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-medium text-gray-900">승인된 답변 목록</h3>
                </div>
                <div class="divide-y divide-gray-200">
                    <template x-for="answer in filteredAnswers" :key="answer.id">
                        <div class="p-6">
                            <div class="flex items-start justify-between">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-2">
                                        <span 
                                            :class="getCategoryColor(answer.category)"
                                            class="px-2 py-1 text-xs font-medium rounded-full"
                                            x-text="getCategoryName(answer.category)"
                                        ></span>
                                        <span class="text-sm text-gray-500" x-text="answer.createdAt"></span>
                                    </div>
                                    <h4 class="text-md font-medium text-gray-900 mb-2" x-text="answer.title"></h4>
                                    <p class="text-sm text-gray-600 mb-3" x-text="answer.content"></p>
                                    <div class="flex flex-wrap gap-1">
                                        <template x-for="tag in answer.tags" :key="tag">
                                            <span class="px-2 py-1 text-xs bg-blue-100 text-blue-800 rounded-md" x-text="tag"></span>
                                        </template>
                                    </div>
                                </div>
                                <div class="flex space-x-2 ml-4">
                                    <button 
                                        @click="editAnswer(answer)"
                                        class="text-gray-400 hover:text-gray-600"
                                    >
                                        ✏️
                                    </button>
                                    <button 
                                        @click="deleteAnswer(answer.id)"
                                        class="text-gray-400 hover:text-red-600"
                                    >
                                        🗑️
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- 승인 로그 탭 -->
        <div x-show="activeTab === 'logs'" class="space-y-6">
            
            <!-- 필터 -->
            <div class="bg-white rounded-lg p-6 shadow-sm">
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1">
                        <input 
                            type="date" 
                            x-model="logDateFilter"
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                        >
                    </div>
                    <div>
                        <select 
                            x-model="logStatusFilter"
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                        >
                            <option value="">전체 상태</option>
                            <option value="approved">승인</option>
                            <option value="rejected">거부</option>
                            <option value="pending">대기</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 로그 목록 -->
            <div class="bg-white rounded-lg shadow-sm">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-medium text-gray-900">승인 로그</h3>
                </div>
                <div class="divide-y divide-gray-200">
                    <template x-for="log in filteredLogs" :key="log.id">
                        <div class="p-6">
                            <div class="flex items-start justify-between">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-2">
                                        <span 
                                            :class="getStatusColor(log.status)"
                                            class="px-2 py-1 text-xs font-medium rounded-full"
                                            x-text="getStatusName(log.status)"
                                        ></span>
                                        <span class="text-sm text-gray-500" x-text="log.timestamp"></span>
                                    </div>
                                    <div class="mb-3">
                                        <h4 class="font-medium text-gray-900">문의 내용:</h4>
                                        <p class="text-sm text-gray-600" x-text="log.inquiry"></p>
                                    </div>
                                    <div class="mb-3">
                                        <h4 class="font-medium text-gray-900">답변 초안:</h4>
                                        <p class="text-sm text-gray-600" x-text="log.draftAnswer"></p>
                                    </div>
                                    <div x-show="log.rejectionReason" class="mb-3">
                                        <h4 class="font-medium text-red-600">거부 사유:</h4>
                                        <p class="text-sm text-red-600" x-text="log.rejectionReason"></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- 자동처리 규칙 탭 -->
        <div x-show="activeTab === 'rules'" class="space-y-6">
            
            <!-- 전체 자동처리 토글 -->
            <div class="bg-white rounded-lg p-6 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-medium text-gray-900">자동처리 시스템</h3>
                        <p class="text-sm text-gray-500">승인된 답변을 기반으로 자동 응답</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" x-model="autoProcessingEnabled" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-primary-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-600"></div>
                    </label>
                </div>
            </div>

            <!-- 규칙 목록 -->
            <div class="bg-white rounded-lg shadow-sm">
                <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                    <h3 class="text-lg font-medium text-gray-900">처리 규칙</h3>
                    <button 
                        @click="showNewRuleModal = true"
                        class="bg-primary-500 text-white px-4 py-2 rounded-lg hover:bg-primary-600 transition-colors"
                    >
                        새 규칙 추가
                    </button>
                </div>
                <div class="divide-y divide-gray-200">
                    <template x-for="rule in autoRules" :key="rule.id">
                        <div class="p-6">
                            <div class="flex items-start justify-between">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-2">
                                        <span 
                                            :class="rule.enabled ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'"
                                            class="px-2 py-1 text-xs font-medium rounded-full"
                                            x-text="rule.enabled ? '활성' : '비활성'"
                                        ></span>
                                        <span class="text-sm text-gray-500" x-text="getCategoryName(rule.category)"></span>
                                    </div>
                                    <h4 class="font-medium text-gray-900 mb-2" x-text="rule.name"></h4>
                                    <p class="text-sm text-gray-600 mb-2">
                                        키워드: <span class="font-mono bg-gray-100 px-2 py-1 rounded" x-text="rule.keywords.join(', ')"></span>
                                    </p>
                                    <p class="text-sm text-gray-600">
                                        답변: <span x-text="rule.response"></span>
                                    </p>
                                </div>
                                <div class="flex space-x-2 ml-4">
                                    <button 
                                        @click="toggleRule(rule.id)"
                                        :class="rule.enabled ? 'text-green-600 hover:text-green-800' : 'text-gray-400 hover:text-gray-600'"
                                    >
                                        <span x-text="rule.enabled ? '⏸️' : '▶️'"></span>
                                    </button>
                                    <button 
                                        @click="editRule(rule)"
                                        class="text-gray-400 hover:text-gray-600"
                                    >
                                        ✏️
                                    </button>
                                    <button 
                                        @click="deleteRule(rule.id)"
                                        class="text-gray-400 hover:text-red-600"
                                    >
                                        🗑️
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

    </div>

    <!-- 새 답변 추가 모달 -->
    <div x-show="showNewAnswerModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-11/12 md:w-1/2 shadow-lg rounded-md bg-white">
            <div class="mt-3">
                <h3 class="text-lg font-bold text-gray-900 mb-4">새 답변 추가</h3>
                <form @submit.prevent="saveNewAnswer()">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">제목</label>
                        <input type="text" x-model="newAnswer.title" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">카테고리</label>
                        <select x-model="newAnswer.category" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500" required>
                            <option value="">카테고리 선택</option>
                            <option value="delivery">배송</option>
                            <option value="refund">환불</option>
                            <option value="product">제품</option>
                            <option value="general">일반</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">답변 내용</label>
                        <textarea x-model="newAnswer.content" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500" required></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">키워드 태그 (쉼표로 구분)</label>
                        <input type="text" x-model="newAnswer.tagsInput" placeholder="예: 섭취법, 복용량, 부작용" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button 
                            type="button" 
                            @click="closeNewAnswerModal()"
                            class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400"
                        >
                            취소
                        </button>
                        <button 
                            type="submit"
                            class="px-4 py-2 bg-primary-500 text-white rounded-md hover:bg-primary-600"
                        >
                            저장
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 새 규칙 추가 모달 -->
    <div x-show="showNewRuleModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-11/12 md:w-1/2 shadow-lg rounded-md bg-white">
            <div class="mt-3">
                <h3 class="text-lg font-bold text-gray-900 mb-4">새 자동처리 규칙 추가</h3>
                <form @submit.prevent="saveNewRule()">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">규칙 이름</label>
                        <input type="text" x-model="newRule.name" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">카테고리</label>
                        <select x-model="newRule.category" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500" required>
                            <option value="">카테고리 선택</option>
                            <option value="delivery">배송</option>
                            <option value="refund">환불</option>
                            <option value="product">제품</option>
                            <option value="general">일반</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">키워드 (쉼표로 구분)</label>
                        <input type="text" x-model="newRule.keywordsInput" placeholder="예: 섭취법, 복용법, 먹는법" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">자동 응답</label>
                        <textarea x-model="newRule.response" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-500" required></textarea>
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button 
                            type="button" 
                            @click="closeNewRuleModal()"
                            class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400"
                        >
                            취소
                        </button>
                        <button 
                            type="submit"
                            class="px-4 py-2 bg-primary-500 text-white rounded-md hover:bg-primary-600"
                        >
                            저장
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JS 파일들 -->
    <script src="js/data.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
